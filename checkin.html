<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>学生打卡 · 拍照定位</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f5f7fa;padding:12px;max-width:600px;margin:0 auto}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px #0000000a}
.title{font-size:18px;font-weight:600;text-align:center;margin-bottom:16px;color:#1e293b}
.input-row{display:flex;align-items:center;margin-bottom:12px}
.input-label{width:70px;font-size:16px;color:#1e293b;flex-shrink:0}
.input-row input{flex:1;padding:12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px;width:auto;margin-bottom:0}
.input-row .password-container{flex:1;display:flex;align-items:center;border:1px solid #cbd5e1;border-radius:10px;background:white}
.input-row .password-container input{flex:1;border:none;outline:none;padding:12px;margin:0;background:transparent}
.input-row .password-container button{width:44px;height:44px;background:transparent;border:none;color:#64748b;cursor:pointer;padding:0;margin:0;display:flex;align-items:center;justify-content:center}
button{width:100%;padding:12px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:16px;font-weight:500;margin-bottom:8px;touch-action:manipulation}
button.gray{background:#475569}
button.small{background:#64748b;font-size:14px;padding:8px}
.success{color:#16a34a;text-align:center;margin:8px 0}
.error{color:#dc2626;text-align:center;margin:8px 0}
video, .preview-img{width:100%;border-radius:10px;margin:8px 0;background:#e2e8f0}
.preview-img{max-height:220px;object-fit:contain;border:1px solid #cbd5e1;display:none}
.status-msg{padding:10px;border-radius:8px;margin:12px 0;font-weight:500}
.flex-row{display:flex;gap:8px;margin-top:12px}
.flex-row button{flex:1;margin-bottom:0}
#admin-login-card{position:relative;margin-top:10px}
.close-btn{background:#ef4444;margin-top:8px}
.protocol-warning{background:#fee2e2;border:1px solid #fecaca;color:#b91c1c;padding:12px;border-radius:8px;margin-bottom:16px;text-align:center;font-weight:500}
#model-loading{text-align:center;color:#666;padding:10px;display:none}
</style>
</head>
<body>

<div id="protocol-warning" class="protocol-warning" style="display: none;">
  ⚠️ 检测到您正在使用 <strong>file://</strong> 协议打开本页面。<br>摄像头和定位功能无法在此协议下工作。<br>请务必通过 HTTP 服务器访问（例如 http://你的IP:端口/checkin.html）。
</div>

<!-- 学生登录卡片 -->
<div class="card" id="login-card">
  <div class="title">📱 学生打卡登录</div>
  <div class="input-row"><span class="input-label">姓名：</span><input type="text" id="name" placeholder="请输入中文姓名"></div>
  <div class="input-row"><span class="input-label">手机号：</span><input type="text" id="phone" placeholder="11位数字"></div>
  <div class="input-row"><span class="input-label">学号：</span><input type="text" id="number" placeholder="9位数字"></div>
  <button onclick="login()">登录并进入打卡</button>
  <button class="gray" onclick="showAdminLogin()">📋 管理端入口</button>
</div>

<!-- 管理端登录卡片（初始隐藏） -->
<div class="card" id="admin-login-card" style="display: none;">
  <div class="title">🔐 管理端登录</div>
  <div class="input-row">
    <span class="input-label">账号：</span>
    <input type="text" id="admin-username" placeholder="请输入账号">
  </div>
  <div class="input-row">
    <span class="input-label">密码：</span>
    <div class="password-container">
      <input type="password" id="admin-password" placeholder="请输入密码">
      <button type="button" onclick="togglePassword('admin-password', this)" id="pwdToggleBtn">
        <!-- 默认隐藏状态（闭眼图标） -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
  </div>
  <button onclick="verifyAdminLogin()">登录并进入管理端</button>
  <button class="gray close-btn" onclick="hideAdminLogin()">取消</button>
</div>

<!-- 拍照打卡卡片 -->
<div class="card" id="camera-section" style="display:none">
  <div class="title">📸 拍照打卡</div>
  <div id="model-loading">⏳ 正在加载人脸检测模型，首次检测稍慢...</div>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="photoPreview" class="preview-img" src="#" alt="预览">
  <div class="flex-row">
    <button onclick="takePhoto()">📷 拍照</button>
    <button onclick="retake()">🔄 重拍</button>
  </div>
  <button onclick="submitCheckin()" id="submitBtn" style="background:#059669;">📍 获取定位并提交打卡</button>
  <button id="retry-camera-btn" class="gray small" onclick="retryCameraPermission()" style="display:none;">🔄 重新请求摄像头权限</button>
  <button id="retry-location-btn" class="gray small" onclick="retryLocationPermission()" style="display:none;">🔄 重新请求定位权限</button>
  <div id="status" class="status-msg"></div>
  <button class="gray small" onclick="backToLogin()">← 返回登录</button>
</div>

<script>
// 检测协议
if (window.location.protocol === 'file:') {
  document.getElementById('protocol-warning').style.display = 'block';
  document.querySelectorAll('button').forEach(btn => btn.disabled = true);
  throw new Error('请通过HTTP协议访问');
}

let currentUser = { name: '', phone: '', number: '' };
let photoDataURL = null;
let videoStream = null;
let faceDetectionModelLoaded = false;

// 页面加载时预加载人脸检测模型
window.addEventListener('load', async () => {
  try {
    document.getElementById('model-loading').style.display = 'block';
    await faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
    faceDetectionModelLoaded = true;
    document.getElementById('model-loading').style.display = 'none';
    console.log('人脸检测模型加载成功');
  } catch (err) {
    console.error('人脸检测模型加载失败:', err);
    document.getElementById('model-loading').innerHTML = '⚠️ 人脸检测模型加载失败，将跳过人脸检测。';
    faceDetectionModelLoaded = false;
  }
});

// 显示/隐藏密码（SVG图标切换）
function togglePassword(fieldId, btn) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    // 睁眼图标（显示密码）
    btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  } else {
    field.type = 'password';
    // 闭眼图标（隐藏密码，带斜线）
    btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  }
}

// 管理端登录相关
function showAdminLogin() { document.getElementById('admin-login-card').style.display = 'block'; }
function hideAdminLogin() { document.getElementById('admin-login-card').style.display = 'none'; }
function verifyAdminLogin() {
  const username = document.getElementById('admin-username').value.trim();
  const password = document.getElementById('admin-password').value.trim();
  if (username === 'aqsfteacher' && password === '123456') {
    sessionStorage.setItem('adminLoggedIn', 'true');
    window.location.href = 'admin.html';
  } else { alert('账号或密码错误'); }
}

// 学生登录
function login() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const number = document.getElementById('number').value.trim();
  if (!/^[\u4e00-\u9fa5]+$/.test(name)) { alert('姓名必须为中文（不能包含空格或数字）'); return; }
  if (!/^\d{11}$/.test(phone)) { alert('手机号必须为11位数字'); return; }
  if (!/^\d{9}$/.test(number)) { alert('学号必须为9位数字'); return; }
  currentUser = { name, phone, number };
  document.getElementById('login-card').style.display = 'none';
  document.getElementById('camera-section').style.display = 'block';
  startCamera();
}

// 摄像头相关
function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showPermissionError('您的浏览器不支持摄像头访问，请使用现代浏览器（如Chrome）。');
    return;
  }
  const constraints = { video: { facingMode: { exact: 'environment' } } };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(handleStream)
    .catch(err => {
      console.warn('后置摄像头失败，尝试任意摄像头:', err);
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(handleStream)
        .catch(err => { console.error('摄像头最终失败:', err); handleCameraError(err); });
    });
}
function handleStream(stream) {
  videoStream = stream;
  const video = document.getElementById('video');
  video.srcObject = stream;
  video.onloadedmetadata = () => video.play();
  document.getElementById('retry-camera-btn').style.display = 'none';
}
function handleCameraError(err) {
  let message = '';
  if (err.name === 'NotAllowedError') {
    message = '摄像头权限被拒绝。请按以下步骤开启：\n1. 点击浏览器地址栏左侧的锁图标或权限图标；\n2. 找到“摄像头”权限，设置为“允许”；\n3. 刷新页面后重试。';
    document.getElementById('retry-camera-btn').style.display = 'block';
  } else if (err.name === 'NotFoundError') {
    message = '未检测到摄像头设备，请确保设备已连接且驱动正常。';
  } else if (err.name === 'NotReadableError') {
    message = '摄像头被其他应用占用，请关闭其他使用摄像头的应用后重试。';
  } else { message = '摄像头启动失败：' + err.message; }
  showPermissionError(message);
}
function retryCameraPermission() {
  document.getElementById('status').innerHTML = '⏳ 重新请求摄像头权限...';
  document.getElementById('status').className = 'status-msg';
  document.getElementById('retry-camera-btn').style.display = 'none';
  if (videoStream) { videoStream.getTracks().forEach(track => track.stop()); videoStream = null; }
  startCamera();
}
function showPermissionError(msg) {
  const statusEl = document.getElementById('status');
  statusEl.innerHTML = '❌ ' + msg.replace(/\n/g, '<br>');
  statusEl.className = 'status-msg error';
}

// 拍照及人脸检测
async function takePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const preview = document.getElementById('photoPreview');
  if (!video.videoWidth) { alert('摄像头尚未就绪，请稍后重试。'); return; }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  if (faceDetectionModelLoaded) {
    try {
      const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions());
      if (detections.length === 0) {
        alert('未识别到人像，请重新拍照（确保面部清晰可见）');
        return;
      }
    } catch (err) { console.error('人脸检测出错:', err); }
  }

  photoDataURL = canvas.toDataURL('image/jpeg', 0.8);
  preview.src = photoDataURL;
  preview.style.display = 'block';
  video.style.display = 'none';
  document.getElementById('status').innerHTML = '';
}
function retake() {
  document.getElementById('video').style.display = 'block';
  document.getElementById('photoPreview').style.display = 'none';
  photoDataURL = null;
}

// 定位提交
function submitCheckin() {
  if (!photoDataURL) { alert('请先拍照'); return; }
  if (!navigator.geolocation) { alert('您的浏览器不支持地理位置定位。'); return; }

  const statusEl = document.getElementById('status');
  statusEl.innerHTML = '⏳ 正在获取位置，请稍候...';
  statusEl.className = 'status-msg';
  document.getElementById('retry-location-btn').style.display = 'none';

  navigator.geolocation.getCurrentPosition(
    position => {
      const { latitude, longitude } = position.coords;
      const record = {
        id: Date.now(),
        name: currentUser.name,
        phone: currentUser.phone,
        number: currentUser.number,
        time: new Date().toLocaleString('zh-CN', { hour12: false }),
        timestamp: Date.now(),
        lat: latitude,
        lng: longitude,
        photo: photoDataURL,
      };
      let records = JSON.parse(localStorage.getItem('checkins')) || [];
      records.unshift(record);
      localStorage.setItem('checkins', JSON.stringify(records));

      statusEl.innerHTML = '✅ 打卡成功！记录已保存。';
      statusEl.className = 'status-msg success';
      setTimeout(() => { retake(); }, 2000);
    },
    error => {
      console.error('定位失败:', error);
      let msg = '';
      if (error.code === error.PERMISSION_DENIED) {
        msg = '位置权限被拒绝。请按以下步骤开启：\n1. 点击浏览器地址栏左侧的锁图标；\n2. 找到“位置”权限，设置为“允许”；\n3. 刷新页面后重试。';
        document.getElementById('retry-location-btn').style.display = 'block';
      } else if (error.code === error.POSITION_UNAVAILABLE) {
        msg = '位置信息不可用，请检查GPS或网络。';
      } else if (error.code === error.TIMEOUT) {
        msg = '定位请求超时，请重试。';
      } else { msg = '未知错误：' + error.message; }
      statusEl.innerHTML = '❌ ' + msg.replace(/\n/g, '<br>');
      statusEl.className = 'status-msg error';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}
function retryLocationPermission() {
  document.getElementById('retry-location-btn').style.display = 'none';
  submitCheckin();
}
function backToLogin() {
  if (videoStream) { videoStream.getTracks().forEach(track => track.stop()); videoStream = null; }
  document.getElementById('login-card').style.display = 'block';
  document.getElementById('camera-section').style.display = 'none';
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('video').style.display = 'block';
  photoDataURL = null;
  document.getElementById('status').innerHTML = '';
  document.getElementById('retry-camera-btn').style.display = 'none';
  document.getElementById('retry-location-btn').style.display = 'none';
}
window.addEventListener('beforeunload', () => {
  if (videoStream) videoStream.getTracks().forEach(track => track.stop());
});
</script>
<!-- 引入 face-api.js 用于人脸检测 -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</body>
</html>
